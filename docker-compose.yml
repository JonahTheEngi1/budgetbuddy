services:
  budgetflow:
    build: .
    container_name: budgetflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - budgetflow-data:/app/data
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=change-me-to-a-secure-random-string
      - PORT=5000

volumes:
  budgetflow-data:
    driver: local
